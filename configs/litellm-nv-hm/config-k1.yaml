# R38.2: NV HM LiteLLM container for Key1 (port 41101)
# 3 deployments: nvglm5.1_k1, nvkimi_k1, nvdeepseek_k1
# R38.7: timeout 60→35 (sync with hm-proxy UPSTREAM_TIMEOUT=45; avoids NV quota waste)
# R38.2: Removed nvminimax_k1 (minimax removed from HM model tiers)
model_list:
  - model_name: nvglm5.1_k1
    litellm_params:
      model: openai/z-ai/glm-5.1
      api_key: os.environ/NV_KEY1
      api_base: os.environ/NV_BASEURL
      timeout: 35
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

  - model_name: nvkimi_k1
    litellm_params:
      model: openai/moonshotai/kimi-k2.6
      api_key: os.environ/NV_KEY1
      api_base: os.environ/NV_BASEURL
      timeout: 35
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

  - model_name: nvdeepseek_k1
    litellm_params:
      model: openai/deepseek-ai/deepseek-v4-pro
      api_key: os.environ/NV_KEY1
      api_base: os.environ/NV_BASEURL
      timeout: 35
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

router_settings:
  num_retries: 0
  cooldown_time: 10
  routing_strategy: simple-shuffle
  allowed_fails_policy:
    num_retries_allowed_fails_policy: 0
    model_group_allowed_fails_policy_map: {}

general_settings:
  drop_params: true
  json_logs: true
  request_timeout: 35

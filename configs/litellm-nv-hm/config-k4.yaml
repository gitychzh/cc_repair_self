# R37: NV HM LiteLLM container for Key4 (port 41104)
# 4 deployments: nvkimi_k4, nvglm5.1_k4, nvminimax_k4, nvdeepseek_k4
model_list:
  - model_name: nvkimi_k4
    litellm_params:
      model: openai/moonshotai/kimi-k2.6
      api_key: os.environ/NV_KEY4
      api_base: os.environ/NV_BASEURL
      timeout: 60
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

  - model_name: nvglm5.1_k4
    litellm_params:
      model: openai/z-ai/glm-5.1
      api_key: os.environ/NV_KEY4
      api_base: os.environ/NV_BASEURL
      timeout: 60
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

  - model_name: nvminimax_k4
    litellm_params:
      model: openai/minimaxai/minimax-m3
      api_key: os.environ/NV_KEY4
      api_base: os.environ/NV_BASEURL
      timeout: 60
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

  - model_name: nvdeepseek_k4
    litellm_params:
      model: openai/deepseek-ai/deepseek-v4-pro
      api_key: os.environ/NV_KEY4
      api_base: os.environ/NV_BASEURL
      timeout: 60
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

router_settings:
  num_retries: 0
  cooldown_time: 10
  routing_strategy: simple-shuffle
  allowed_fails_policy:
    num_retries_allowed_fails_policy: 0
    model_group_allowed_fails_policy_map: {}

general_settings:
  drop_params: true
  json_logs: true
  request_timeout: 60

# R38.11: NV HM LiteLLM container (2 deployments: nvglm5.1_kN, nvkimi_kN)
# deepseek removed — hm40006 uses NVCF pexec direct path (bypasses DEGRADING integrate API)
# nvdeepseek_kN was dead code: hm40006 code route deepseek via NVCF pexec, never reaches LiteLLM
# R38.7: timeout 60→35 (sync with hm-proxy UPSTREAM_TIMEOUT=45; avoids NV quota waste)
model_list:
  - model_name: nvglm5.1_k5
    litellm_params:
      model: openai/z-ai/glm-5.1
      api_key: os.environ/NV_KEY5
      api_base: os.environ/NV_BASEURL
      timeout: 35
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

  - model_name: nvkimi_k5
    litellm_params:
      model: openai/moonshotai/kimi-k2.6
      api_key: os.environ/NV_KEY5
      api_base: os.environ/NV_BASEURL
      timeout: 35
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

router_settings:
  num_retries: 0
  cooldown_time: 10
  routing_strategy: simple-shuffle
  allowed_fails_policy:
    num_retries_allowed_fails_policy: 0
    model_group_allowed_fails_policy_map: {}

general_settings:
  drop_params: true
  json_logs: true
  request_timeout: 35

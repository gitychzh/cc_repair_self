# ── R38.8: NV per-key proxy — script reads mihomo health-check data ──
# All 5 groups are type:select, managed by nv_proxy_selector.sh
# Script reads mihomo API NV latency data (health-check url = NV API), picks lowest latency top5
# Each K gets a different node → different exit IP → IP diversity by latency ranking
- listen: 0.0.0.0
  name: nv-us-k1
  port: 7894
  proxy: ♻️US-NV-K1
  type: mixed
- listen: 0.0.0.0
  name: nv-us-k2
  port: 7895
  proxy: ♻️US-NV-K2
  type: mixed
- listen: 0.0.0.0
  name: nv-us-k3
  port: 7896
  proxy: ♻️US-NV-K3
  type: mixed
- listen: 0.0.0.0
  name: nv-us-k4
  port: 7897
  proxy: ♻️US-NV-K4
  type: mixed
- listen: 0.0.0.0
  name: nv-us-k5
  port: 7899
  proxy: ♻️US-NV-K5
  type: mixed
log-level: info
mixed-port: 7880
mode: rule
profile:
  store-selected: true
proxies: []
proxy-groups:
- name: 🚀节点选择
  proxies:
  - DIRECT
  - ♻️自动选择
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️自动选择
  proxies: []
  tolerance: 50
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇯🇵日本节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️JP自动
  proxies: []
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇸🇬狮城节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️SG自动
  proxies: []
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇺🇸美国节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️US自动
  proxies: []
  tolerance: 50
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🐟漏网之鱼
  proxies:
  - DIRECT
  - 🚀节点选择
  type: select
  use:
  - pq-provider
- name: 🛑广告拦截
  proxies:
  - REJECT
  - DIRECT
  type: select
  use:
  - pq-provider
# ── R38.8: 5 NV proxy groups — type:select, managed by script ──
# Script reads mihomo API NV latency data (from health-check url = NV API /v1/models),
# ranks by delay, assigns top5 to K1-K5. health-check url = NV API (not gstatic).
# Script reads mihomo API NV latency data (from health-check), ranks by delay,
# assigns top5 to K1-K5. health-check url = NV API /v1/models (not gstatic).
# This ensures: NV-specific latency data + alive detection + no overlap + script control.
- name: ♻️US-NV-K1
  proxies: []
  type: select
  use:
  - nv-us-provider
- name: ♻️US-NV-K2
  proxies: []
  type: select
  use:
  - nv-us-provider
- name: ♻️US-NV-K3
  proxies: []
  type: select
  use:
  - nv-us-provider
- name: ♻️US-NV-K4
  proxies: []
  type: select
  use:
  - nv-us-provider
- name: ♻️US-NV-K5
  proxies: []
  type: select
  use:
  - nv-us-provider
proxy-providers:
  nv-us-provider:
    # R38.8: health-check url changed from gstatic to NV API /v1/models
    # Root cause: gstatic alive nodes may be dead to NV API (delay=0, nv_alive=False)
    # Now mihomo kernel tests NV API directly every 180s → dead nodes detected within 3min
    filter: 美国
    filter: 美国|圣何塞|阿什本|洛杉矶
    health-check:
      enable: true
      interval: 180
      timeout: 5000
      url: https://integrate.api.nvidia.com/v1/models
    interval: 3600
    path: /home/opc_uname/.config/mihomo/nv-us-provider.yaml
    type: http
    url: https://dash.pqjc.site/api/v1/pq/ad4978e7f9844ad86d770a863f61ad4b
  pq-provider:
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204
    interval: 3600
    path: /home/opc_uname/.config/mihomo/pq-provider.yaml
    type: http
    url: https://dash.pqjc.site/api/v1/pq/ad4978e7f9844ad86d770a863f61ad4b
rules:
- IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
- DOMAIN-SUFFIX,ts.net,DIRECT
- DOMAIN-SUFFIX,tailscale.com,DIRECT
- DOMAIN-KEYWORD,tailscale,DIRECT
- DOMAIN-SUFFIX,ads.google.com,🛑广告拦截
- DOMAIN-SUFFIX,ad.doubleclick.net,🛑广告拦截
- DOMAIN-SUFFIX,tracking.google.com,🛑广告拦截
- GEOIP,CN,DIRECT
- MATCH,🐟漏网之鱼
secret: set-your-secret
tcp-concurrent: true
tun:

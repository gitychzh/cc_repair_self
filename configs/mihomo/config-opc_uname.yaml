allow-lan: true
bind-address: '*'
dns:
  default-nameserver:
  - 223.5.5.5
  - 114.114.114.114
  enable: false
  enhanced-mode: redir-host
  fallback:
  - 8.8.8.8
  - 1.1.1.1
  nameserver:
  - 223.5.5.5
  - 114.114.114.114
external-controller: 0.0.0.0:9090
external-controller-cors:
  allow-origins:
  - https://yacd.metacubex.one
  - https://metacubex.github.io
  - https://board.zash.run.place
  allow-private-network: true
ipv6: false
listeners:
- listen: 0.0.0.0
  name: sg-fast
  port: 7891
  proxy: 🇸🇬狮城节点
  type: mixed
- listen: 0.0.0.0
  name: jp-fast
  port: 7892
  proxy: 🇯🇵日本节点
  type: mixed
- listen: 0.0.0.0
  name: us-fast
  port: 7893
  proxy: ♻️US自动
  type: mixed
- listen: 0.0.0.0
  name: nv-us-proxy
  port: 7894
  proxy: ♻️US-NV
  type: mixed
log-level: info
mixed-port: 7880
mode: rule
profile:
  store-selected: true
proxies: []
proxy-groups:
- name: 🚀节点选择
  proxies:
  - DIRECT
  - ♻️自动选择
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️自动选择
  proxies: []
  tolerance: 50
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇯🇵日本节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️JP自动
  proxies: []
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇸🇬狮城节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️SG自动
  proxies: []
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇺🇸美国节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️US自动
  proxies: []
  tolerance: 50
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🐟漏网之鱼
  proxies:
  - DIRECT
  - 🚀节点选择
  type: select
  use:
  - pq-provider
- name: 🛑广告拦截
  proxies:
  - REJECT
  - DIRECT
  type: select
  use:
  - pq-provider
- interval: 60
  name: ♻️US-NV
  proxies: []
  tolerance: 100
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - nv-us-provider
proxy-providers:
  nv-us-provider:
    filter: 美国|圣何塞|阿什本|洛杉矶
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204
    interval: 3600
    path: /home/opc_uname/.config/mihomo/nv-us-provider.yaml
    type: http
    url: https://dash.pqjc.site/api/v1/pq/ad4978e7f9844ad86d770a863f61ad4b
  pq-provider:
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204
    interval: 3600
    path: /home/opc_uname/.config/mihomo/pq-provider.yaml
    type: http
    url: https://dash.pqjc.site/api/v1/pq/ad4978e7f9844ad86d770a863f61ad4b
rules:
- IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
- DOMAIN-SUFFIX,ts.net,DIRECT
- DOMAIN-SUFFIX,tailscale.com,DIRECT
- DOMAIN-KEYWORD,tailscale,DIRECT
- DOMAIN-SUFFIX,ads.google.com,🛑广告拦截
- DOMAIN-SUFFIX,ad.doubleclick.net,🛑广告拦截
- DOMAIN-SUFFIX,tracking.google.com,🛑广告拦截
- GEOIP,CN,DIRECT
- MATCH,🐟漏网之鱼
secret: set-your-secret
tcp-concurrent: true
tun:
  auto-detect-interface: false
  auto-route: false
  dns-hijack: []
  enable: false
  stack: gvisor
  strict-route: false
unified-delay: true

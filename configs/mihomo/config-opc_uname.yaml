allow-lan: true
bind-address: '*'
dns:
  default-nameserver:
  - 223.5.5.5
  - 114.114.114.114
  enable: false
  enhanced-mode: redir-host
  fallback:
  - 8.8.8.8
  - 1.1.1.1
  nameserver:
  - 223.5.5.5
  - 114.114.114.114
external-controller: 0.0.0.0:9090
external-controller-cors:
  allow-origins:
  - https://yacd.metacubex.one
  - https://metacubex.github.io
  - https://board.zash.run.place
  allow-private-network: true
ipv6: false
listeners:
- listen: 0.0.0.0
  name: sg-fast
  port: 7891
  proxy: 🇸🇬狮城节点
  type: mixed
- listen: 0.0.0.0
  name: jp-fast
  port: 7892
  proxy: 🇯🇵日本节点
  type: mixed
- listen: 0.0.0.0
  name: us-fast
  port: 7893
  proxy: ♻️US自动
  type: mixed
# ── R36.3: NV per-key proxy ports — protocol-based groups for guaranteed IP diversity ──
# K1(7894): Hysteria2 fastest (QUIC protocol, 8 unique servers, ~165ms, anti-packet-loss)
# K2(7895): Vless 三网推荐 (7 unique IPs 134.195.101.x, ~170-207ms, San Jose real IPs)
# K3(7896): Vless 0.1倍率 excluding 三网/电信联通 (CF CDN shared IP, cheap nodes)
# K4(7897): All US tolerance=30 (fallback, picks within 30ms of best)
# K5(7899): All US tolerance=0 (absolute fastest, emergency fallback)
- listen: 0.0.0.0
  name: nv-us-k1
  port: 7894
  proxy: ♻️US-NV-K1
  type: mixed
- listen: 0.0.0.0
  name: nv-us-k2
  port: 7895
  proxy: ♻️US-NV-K2
  type: mixed
- listen: 0.0.0.0
  name: nv-us-k3
  port: 7896
  proxy: ♻️US-NV-K3
  type: mixed
- listen: 0.0.0.0
  name: nv-us-k4
  port: 7897
  proxy: ♻️US-NV-K4
  type: mixed
- listen: 0.0.0.0
  name: nv-us-k5
  port: 7899
  proxy: ♻️US-NV-K5
  type: mixed
log-level: info
mixed-port: 7880
mode: rule
profile:
  store-selected: true
proxies: []
proxy-groups:
- name: 🚀节点选择
  proxies:
  - DIRECT
  - ♻️自动选择
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️自动选择
  proxies: []
  tolerance: 50
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇯🇵日本节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️JP自动
  proxies: []
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇸🇬狮城节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️SG自动
  proxies: []
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🇺🇸美国节点
  proxies: []
  type: select
  use:
  - pq-provider
- interval: 300
  name: ♻️US自动
  proxies: []
  tolerance: 50
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - pq-provider
- name: 🐟漏网之鱼
  proxies:
  - DIRECT
  - 🚀节点选择
  type: select
  use:
  - pq-provider
- name: 🛑广告拦截
  proxies:
  - REJECT
  - DIRECT
  type: select
  use:
  - pq-provider
# ── R36.3: 5 NV proxy groups — protocol-based for guaranteed IP diversity ──
# Each group selects nodes by protocol/server type, not by region name.
# Different protocols → different servers → different exit IPs → guaranteed IP diversity.
# url-test with tolerance=0 picks the lowest-latency node within each group.
# Script (nv_proxy_selector.sh) handles IP diversity enforcement via mihomo API.
- interval: 120
  name: ♻️US-NV-K1
  proxies: []
  tolerance: 0
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - nv-us-provider
  # Hysteria2 nodes: pq.us1-8.globals-download.com, 8 unique exit IPs, QUIC protocol
  filter: "电信联通移动推荐"
- interval: 120
  name: ♻️US-NV-K2
  proxies: []
  tolerance: 0
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - nv-us-provider
  # Vless 三网推荐: 134.195.101.x unique IPs (San Jose real servers), best Vless quality
  filter: "三网推荐"
- interval: 120
  name: ♻️US-NV-K3
  proxies: []
  tolerance: 0
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - nv-us-provider
  # Vless 0.1倍率 excluding 三网/电信联通推荐 (cheaper CF CDN nodes, shared IP pool)
  filter: "0\\.1倍"
  exclude-filter: "电信联通移动推荐|三网推荐"
- interval: 120
  name: ♻️US-NV-K4
  proxies: []
  tolerance: 30
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - nv-us-provider
  # Vless nodes excluding 三网/电信联通推荐 — pure Vless pool (different protocol from K1)
  exclude-filter: "电信联通移动推荐|三网推荐"
- interval: 120
  name: ♻️US-NV-K5
  proxies: []
  tolerance: 0
  type: url-test
  url: http://www.gstatic.com/generate_204
  use:
  - nv-us-provider
  # All US nodes, tolerance=0 — absolute fastest, emergency fallback
proxy-providers:
  nv-us-provider:
    filter: 美国|圣何塞|阿什本|洛杉矶
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204
    interval: 3600
    path: /home/opc_uname/.config/mihomo/nv-us-provider.yaml
    type: http
    url: https://dash.pqjc.site/api/v1/pq/ad4978e7f9844ad86d770a863f61ad4b
  pq-provider:
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204
    interval: 3600
    path: /home/opc_uname/.config/mihomo/pq-provider.yaml
    type: http
    url: https://dash.pqjc.site/api/v1/pq/ad4978e7f9844ad86d770a863f61ad4b
rules:
- IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
- DOMAIN-SUFFIX,ts.net,DIRECT
- DOMAIN-SUFFIX,tailscale.com,DIRECT
- DOMAIN-KEYWORD,tailscale,DIRECT
- DOMAIN-SUFFIX,ads.google.com,🛑广告拦截
- DOMAIN-SUFFIX,ad.doubleclick.net,🛑广告拦截
- DOMAIN-SUFFIX,tracking.google.com,🛑广告拦截
- GEOIP,CN,DIRECT
- MATCH,🐟漏网之鱼
secret: set-your-secret
tcp-concurrent: true
tun:
  auto-detect-interface: false
  auto-route: false
  dns-hijack: []
  enable: false
  stack: gvisor
  strict-route: false
unified-delay: true

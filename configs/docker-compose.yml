# R29: Three-proxy architecture — 3 proxy containers + 1 LiteLLM + 1 postgres
# 40001 (cc):          CC → Anthropic format → 41001 glm5.2 v×k
# 40002 (codex):       Codex → Responses API → 41001 glm5.2 v×k
# 40003 (passthrough): _ol/_oc/_hm → OpenAI passthrough → 41001 dsv4p v×k
# 41001: ms_uni41001 LiteLLM (70 glm5.2 + 70 dsv4p = 140 dep)
# R29: Removed ms_uni41002 (LiteLLM fallback), removed 40002 fallback proxy
#
# Port assignments: 41001=LiteLLM, 40001=proxy(cc), 40002=proxy(codex), 40003=proxy(passthrough)
# ulimit nofile: 41001 uses 2048 soft / 65536 hard (140 dep)

services:
  cc_postgres:
    image: postgres:16-alpine
    container_name: cc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
      POSTGRES_MULTIPLE_DATABASES: litellm_glm51
      TZ: Asia/Shanghai
    volumes:
      - cc_pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "5432"
    networks:
      - cc-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U litellm -d litellm
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: &id001
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
        tag: container/{{.Name}}

  # ─── R29: Unified LiteLLM container (140 dep = 70 glm5.2 + 70 dsv4p) ───
  ms_uni41001:
    image: litellm/litellm:v1.87.0
    container_name: ms_uni41001
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 2048
        hard: 65536
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@cc_postgres:5432/litellm_glm51
      MS_BASEURL: https://api-inference.modelscope.cn/v1
      MS_KEY1: ms-bb4e5bee-ca0e-49be-8de3-2347a57752f5
      MS_KEY2: ms-b836c297-9cb3-45f7-86b3-a33e1b76f48f
      MS_KEY3: ms-202e8dc3-b2f0-4aa3-9b56-0fa6798ac5b9
      MS_KEY4: ms-ed773f9d-9ca1-4fd9-87e4-b6acd0e545ae
      MS_KEY5: ms-69d3fbc6-6938-4fb1-b403-dfa44a05fb0c
      MS_KEY6: ms-e392cb51-9637-4766-80aa-490a6044294c
      MS_KEY7: ms-20761627-ec32-497c-a11a-7ff580617f0b
      TZ: Asia/Shanghai
    volumes:
      - ./litellm-glm51/config.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-glm51:/app/logs
    ports:
      - 41001:4000
    networks:
      - cc-net
    depends_on:
      cc_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"
        reservations:
          memory: 768M
          cpus: "0.5"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    logging: *id001
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"

  # ─── 40001: FALLBACK CC proxy (Anthropic format → glm5.2 v×k) ───
  # R31: 40001 = manual fallback (sonnet). Keep config STABLE — never modify params here.
  # Only used when 40005 (primary) has a proxy-level crash. See 40005 notes for caveat
  # (shared glm5.2 quota means switching here does NOT help with all-429 quota exhaustion).
  auth_to_api_40001:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40001
    restart: unless-stopped
    environment:
      PROXY_ROLE: cc
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_URL_DSV4P: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40001"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "128000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      NUM_VARIANTS_DSV4P: "10"
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40001:40001
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40001/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

  # ─── 40005: PRIMARY CC proxy (Anthropic format → glm5.2 v×k, shares 41001) ───
  # R31: 40005 = default CC endpoint (opus), 40001 = manual fallback (sonnet).
  # R31.5: builds from ./proxy/cc-proxy (physically isolated cc-role code).
  #   The shared ./proxy gateway (codex/passthrough/codex logic) is no longer
  #   in 40005's image — a cc-proxy change cannot affect 40002/40003, and vice versa.
  # Both share 41001 LiteLLM + same glm5.2 variants + same MS_KEY → quota is shared
  # per model-id+key, NOT per proxy port. So:
  #   - 40005 PROXY crash / bad params / counter corruption → switch to 40001 (works, different container)
  #   - glm5.2 quota exhausted (all 429) → 40001 will ALSO be all-429 (shared quota, switch useless)
  # Manual failover: change ANTHROPIC_BASE_URL from :40005 to :40001 in
  # ~/.claude/settings.json + .bashrc + .profile, then restart CC.
  # rr_counter.json isolated in ./logs/proxy40005 (R30.1 persistence, independent from 40001).
  # health_check.sh reports 40005 status but does NOT put it in ALL_OK (manual failover only).
  auth_to_api_40005:
    build:
      context: ./proxy/cc-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40005
    restart: unless-stopped
    environment:
      PROXY_ROLE: cc
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_URL_DSV4P: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40005"
      # ── CC proxy params (kept identical to 40001 — 40005 is now primary, not an experiment lab) ──
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "128000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      NUM_VARIANTS_DSV4P: "10"
      # ── end experiment params ──
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy40005:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40005:40005
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40005/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

  # ─── 40002: Codex proxy (Responses API → glm5.2 v×k) ───
  # R31.6: physically isolated — builds from configs/proxy/codex-proxy/ (own image,
  # not shared with 40001/40003/40005). A change here cannot affect other roles.
  auth_to_api_40002:
    build:
      context: ./proxy/codex-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40002
    restart: unless-stopped
    environment:
      PROXY_ROLE: codex
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_URL_DSV4P: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40002"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "128000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      NUM_VARIANTS_DSV4P: "10"
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy40002:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40002:40002
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40002/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

  # ─── 40003: Passthrough proxy (OpenAI → dsv4p v×k) ───
  # Handles Hermes/OpenClaw/OpenCode (_hm/_ol/_oc) — nearly-transparent passthrough
  # R31.6: physically isolated — builds from configs/proxy/passthrough-proxy/ (own image).
  auth_to_api_40003:
    build:
      context: ./proxy/passthrough-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40003
    restart: unless-stopped
    environment:
      PROXY_ROLE: passthrough
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_URL_DSV4P: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40003"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "128000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      NUM_VARIANTS_DSV4P: "10"
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy40003:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40003:40003
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40003/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

networks:
  cc-net:
    driver: bridge

volumes:
  cc_pgdata:

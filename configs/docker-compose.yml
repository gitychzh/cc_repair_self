# R29: Three-proxy architecture — 3 proxy containers + 1 LiteLLM + 1 postgres
# R34.1: _ol/_oc/_hm → glm5.1 (NV direct API tunnel, same as cc-proxy R33.2)
# 40001 (cc):          CC → Anthropic format → 41001 glm5.1 v×k + NV direct API
# 40002 (codex):       Codex → Responses API → 41001 glm5.1 v×k
# 40003 (passthrough): _ol/_oc/_hm → OpenAI passthrough → 41001 glm5.1 v×k + NV direct API
# 41001: ms_uni41001 LiteLLM (70 glm5.1 + 70 dsv4p = 140 dep, dsv4p dead on MS)
# NV LiteLLM containers REMOVED — proxy directly calls NVIDIA API via HTTPS CONNECT tunnel
#
# Port assignments: 41001=LiteLLM, 40000=dispatcher, 40001=proxy(cc), 40002=proxy(codex), 40003=proxy(passthrough)
# ulimit nofile: 41001 uses 2048 soft / 65536 hard (140 dep)

services:
  cc_postgres:
    image: postgres:16-alpine
    container_name: cc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
      POSTGRES_MULTIPLE_DATABASES: litellm_glm51 litellm_nv
      TZ: Asia/Shanghai
    volumes:
      - cc_pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "5432"
    networks:
      - cc-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U litellm -d litellm
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: &id001
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
        tag: container/{{.Name}}

  # ─── R29: Unified LiteLLM container (140 dep = 70 glm5.1 + 70 dsv4p) ───
  ms_uni41001:
    image: litellm/litellm:v1.87.0
    container_name: ms_uni41001
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 2048
        hard: 65536
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@cc_postgres:5432/litellm_glm51
      MS_BASEURL: https://api-inference.modelscope.cn/v1
      MS_KEY1: ms-bb4e5bee-ca0e-49be-8de3-2347a57752f5
      MS_KEY2: ms-b836c297-9cb3-45f7-86b3-a33e1b76f48f
      MS_KEY3: ms-202e8dc3-b2f0-4aa3-9b56-0fa6798ac5b9
      MS_KEY4: ms-ed773f9d-9ca1-4fd9-87e4-b6acd0e545ae
      MS_KEY5: ms-69d3fbc6-6938-4fb1-b403-dfa44a05fb0c
      MS_KEY6: ms-e392cb51-9637-4766-80aa-490a6044294c
      MS_KEY7: ms-20761627-ec32-497c-a11a-7ff580617f0b
      TZ: Asia/Shanghai
    volumes:
      - ./litellm-glm51/config.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-glm51:/app/logs
    ports:
      - 41001:4000
    networks:
      - cc-net
    depends_on:
      cc_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"
        reservations:
          memory: 1536M
          cpus: "0.5"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    logging: *id001
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"

  # ─── 40001: FALLBACK CC proxy — identical config to 40005 (R35) ───
  # R35: 40001 is a full mirror of 40005 (same code, same NV interleaving).
  #   Dispatcher auto-fallback sends traffic here when 40005 connection fails.
  #   Both containers serve identical capability — fallback is lossless.
  #   rr_counter.json isolated in ./logs/proxy40001 (independent from 40005).
  auth_to_api_40001:
    build:
      context: ./proxy/cc-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40001
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROXY_ROLE: cc
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_URL_DSV4P: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40001"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "128000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      NUM_VARIANTS_DSV4P: "10"
      MIN_OUTBOUND_INTERVAL_S: "1.5"
      # ── R35.2: 40001 = 40005 mirror — both pure MS (NV_NUM_KEYS=0, interval=1.5s) ──
      # NV glm-5.1 API unavailable (20s timeout). NV fallthrough wastes ~40s/request.
      # Both containers pure MS ensures lossless fallback (no NV delay).
      # MIN_OUTBOUND_INTERVAL_S=1.5 validated on 40005: 429 rate 30% (down from 49% at 2.0s),
      # avg TTFB 5.0s (down from 10.0s), 100% success rate, 0 ABORTs.
      NV_NUM_KEYS: "0"
      NV_TIMEOUT: "20"
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      NV_KEY1: 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
      NV_KEY2: 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
      NV_PROXY_URL: http://host.docker.internal:7894
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy40001:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40001:40001
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40001/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

  # ─── 40005: PRIMARY CC proxy (Anthropic format → glm5.1 v×k, MS-NV interleaving) ───
  # R31: 40005 = default CC endpoint (opus), 40001 = fallback (sonnet).
  # R31.5: builds from ./proxy/cc-proxy (physically isolated cc-role code).
  # R35: 40005 is the EXPERIMENT container — new params/code deploy here first,
  #   40001 stays as STABLE baseline. compare_proxies.sh + auto_tune.sh drive the iteration.
  # Both share 41001 LiteLLM + same glm5.1 variants + same MS_KEY → quota is shared
  # per model-id+key, NOT per proxy port. So:
  #   - 40005 PROXY crash / bad params → dispatcher auto-fallback to 40001 (R35)
  #   - glm5.1 quota exhausted (all 429) → 40001 will ALSO be all-429 (shared quota)
  # rr_counter.json isolated in ./logs/proxy40005 (R30.1, independent from 40001).
  # When 40005 experiments succeed → sync validated params to 40001 (version promotion).
  auth_to_api_40005:
    build:
      context: ./proxy/cc-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40005
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROXY_ROLE: cc
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_URL_DSV4P: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40005"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "128000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      NUM_VARIANTS_DSV4P: "10"
      MIN_OUTBOUND_INTERVAL_S: "1.5"
      # ── R35.2: 40005 EXPERIMENT — MIN_OUTBOUND_INTERVAL_S reduced 2.0→1.5 ──
      # R35.1: pure MS mode (NV_NUM_KEYS=0, NV disabled). NV API unavailable, NV_FALLTHROUGH wastes 40s/request.
      # R35.2: After ~5h stable pure MS operation: 0 ABORT, avg TTFB 8.5s, 62% 0-cycle success, very low 429 rate.
      # Data supports reducing interval from 2.0→1.5 (25% throughput gain). Risk: more burst 429s.
      # Monitoring: if ANY 429 increase appears, rollback to 2.0 immediately.
      NV_NUM_KEYS: "0"
      NV_TIMEOUT: "20"
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      NV_KEY1: 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
      NV_KEY2: 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
      NV_PROXY_URL: http://host.docker.internal:7894
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy40005:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40005:40005
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40005/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

  # ─── 40000: CC model→endpoint dispatcher (R31.7) ───
  # CC reads ONE ANTHROPIC_BASE_URL. /model only changes the request body model field,
  # not the downstream port. This dispatcher routes by that field so /model switching =
  # upstream switching with zero CC restart:
  #   claude-sonnet-* → 40001 (fallback), everything else (opus, glm5.1_*) → 40005 (primary)
  # Pure relay: no parsing/truncation/format conversion. SSE streamed byte-for-byte.
  # CC's settings.json env.ANTHROPIC_BASE_URL points here permanently (one-time switch).
  auth_to_api_40000:
    build:
      context: ./proxy/dispatcher
      dockerfile: Dockerfile
    container_name: auth_to_api_40000
    restart: unless-stopped
    environment:
      LISTEN_PORT: "40000"
      DISPATCH_PRIMARY: "http://auth_to_api_40005:40005"
      DISPATCH_FALLBACK: "http://auth_to_api_40001:40001"
      UPSTREAM_TIMEOUT: "60"
      PROXY_TIMEOUT: "600"
      TZ: Asia/Shanghai
    ports:
      - 40000:40000
    networks:
      - cc-net
    depends_on:
      - auth_to_api_40005
      - auth_to_api_40001
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.05"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40000/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *id001

  # ─── 40002: Codex proxy (Responses API → glm5.1 v×k) ───
  # R31.6: physically isolated — builds from configs/proxy/codex-proxy/ (own image,
  # not shared with 40001/40003/40005). A change here cannot affect other roles.
  auth_to_api_40002:
    build:
      context: ./proxy/codex-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40002
    restart: unless-stopped
    environment:
      PROXY_ROLE: codex
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_URL_DSV4P: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40002"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "128000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      NUM_VARIANTS_DSV4P: "10"
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy40002:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40002:40002
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40002/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

  # ─── 40003: Passthrough proxy (OpenAI → glm5.1 v×k + NV interleaving) ───
  # R34: _ol/_oc/_hm now route to glm5.1 (dsv4p dropped from ModelScope).
  # Handles Hermes/OpenClaw/OpenCode (_hm/_ol/_oc) — nearly-transparent passthrough
  # R34: NV interleaving — after MS all 429, tries 5 NV containers for burst mitigation.
  # R31.6: physically isolated — builds from configs/proxy/passthrough-proxy/ (own image).
  auth_to_api_40003:
    build:
      context: ./proxy/passthrough-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40003
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROXY_ROLE: passthrough
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_URL_DSV4P: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40003"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "128000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      NUM_VARIANTS_DSV4P: "10"
      MIN_OUTBOUND_INTERVAL_S: "2.0"
      # ── R34.1: NV (NVIDIA) direct API tunnel — same as cc-proxy R33.2 ──
      NV_NUM_KEYS: "5"
      NV_TIMEOUT: "20"
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      NV_KEY1: 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
      NV_KEY2: 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
      NV_KEY3: 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
      NV_KEY4: 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
      NV_KEY5: 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
      NV_PROXY_URL: http://host.docker.internal:7894
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy40003:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40003:40003
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40003/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

networks:
  cc-net:
    driver: bridge

volumes:
  cc_pgdata:

# R29→R36: Multi-proxy architecture
# R36.1: All containers 1CPU/1GB + Docker official proxy config (YAML anchors)
# 40001 (cc):          CC → Anthropic format → 41001 glm5.1 v×k (pure MS, stable baseline)
# 40005 (cc):          CC → Anthropic format → 41001 glm5.1 v×k + NV 5-key alternating (EXPERIMENT)
# 40002 (codex):       Codex → Responses API → 41001 glm5.1 v×k
# 40003 (passthrough): _ol/_oc/_hm → OpenAI passthrough → 41001 glm5.1 v×k (pure MS)
# 41001: ms_uni41001 LiteLLM (70 glm5.1 dep)
# 41001: ms_uni41001 LiteLLM (70 glm5.1 dep)
# 41101-41105: ms_nv_hm_4110X LiteLLM (3 NV model dep each, per-key mihomo proxy → NV API)
#
# Port assignments: 41001=LiteLLM MS, 41101-41105=LiteLLM NV HM, 40000=dispatcher,
#   40001=proxy(cc), 40002=proxy(codex), 40003=proxy(passthrough), 40005=proxy(cc-experiment), 40006=hm-proxy
# ulimit nofile: 41001 uses 2048 soft / 65536 hard (70 dep)

# ── Docker official proxy config: YAML anchors (docs.docker.com/network/proxy/) ──
# All containers needing host access use host.docker.internal (Linux requires extra_hosts).
# Proxy env vars follow Docker official naming (uppercase + lowercase auto-set by config.json).
# NO_PROXY prevents proxy loops for inter-container traffic on cc-net.

x-host-access: &host-access
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-proxy-env-ms: &proxy-env-ms
  # MS containers: use mihomo mixed port 7880 for GitHub access (LiteLLM startup fetch)
  HTTP_PROXY: http://host.docker.internal:7880
  HTTPS_PROXY: http://host.docker.internal:7880
  NO_PROXY: localhost,127.0.0.1,cc_postgres,ms_uni41001,auth_to_api_40000,auth_to_api_40001,auth_to_api_40002,auth_to_api_40003,auth_to_api_40005

x-resource-1c1g-host: &resource-1c1g-host
  # R36.2: Combined resource limits + host access (YAML prohibits multiple << merge keys per mapping)
  extra_hosts:
    - "host.docker.internal:host-gateway"
  deploy:
    resources:
      limits:
        memory: 1G
        cpus: "1.0"
      reservations:
        memory: 256M
        cpus: "0.1"

x-resource-1c1g: &resource-1c1g
  deploy:
    resources:
      limits:
        memory: 1G
        cpus: "1.0"
      reservations:
        memory: 256M
        cpus: "0.1"

x-resource-1c2g-host: &resource-1c2g-host
  # LiteLLM containers: ms_uni41001 (70 dep) + ms_nv_hm_41101-41105 (3 dep each).
  # 1GiB sufficient (actual usage ~500MiB after model cost map loads).
  extra_hosts:
    - "host.docker.internal:host-gateway"
  deploy:
    resources:
      limits:
        memory: 1G
        cpus: "1.0"
      reservations:
        memory: 256M
        cpus: "0.1"

x-logging: &logging
  driver: json-file
  options:
    max-size: 50m
    max-file: '5'
    tag: container/{{.Name}}

services:
  # ─── PostgreSQL ───
  cc_postgres:
    image: postgres:16-alpine
    container_name: cc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
      POSTGRES_MULTIPLE_DATABASES: litellm_glm51 litellm_nv_hm
      TZ: Asia/Shanghai
    volumes:
      - cc_pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "5432"
    networks:
      - cc-net
    <<: *resource-1c1g
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U litellm -d litellm
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *logging

  # ─── LiteLLM container (70 glm5.1 dep) ───
  # R36.3: 2GiB memory limit — model cost map ~810MiB at runtime, needs headroom
  ms_uni41001:
    image: litellm/litellm:v1.87.0
    container_name: ms_uni41001
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 2048
        hard: 65536
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@cc_postgres:5432/litellm_glm51
      MS_BASEURL: https://api-inference.modelscope.cn/v1
      MS_KEY1: ms-bb4e5bee-ca0e-49be-8de3-2347a57752f5
      MS_KEY2: ms-b836c297-9cb3-45f7-86b3-a33e1b76f48f
      MS_KEY3: ms-202e8dc3-b2f0-4aa3-9b56-0fa6798ac5b9
      MS_KEY4: ms-ed773f9d-9ca1-4fd9-87e4-b6acd0e545ae
      MS_KEY5: ms-69d3fbc6-6938-4fb1-b403-dfa44a05fb0c
      MS_KEY6: ms-e392cb51-9637-4766-80aa-490a6044294c
      MS_KEY7: ms-20761627-ec32-497c-a11a-7ff580617f0b
      <<: *proxy-env-ms
      TZ: Asia/Shanghai
    <<: *resource-1c2g-host
    volumes:
      - ./litellm-glm51/config.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-glm51:/app/logs
    ports:
      - 41001:4000
    networks:
      - cc-net
    depends_on:
      cc_postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    logging: *logging
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"

  # ─── 40001: FALLBACK CC proxy (pure MS, stable baseline) ───
  auth_to_api_40001:
    build:
      context: ./proxy/cc-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40001
    restart: unless-stopped
    environment:
      PROXY_ROLE: cc
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40001"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      MIN_OUTBOUND_INTERVAL_S: "1.5"
      NV_NUM_KEYS: "0"
      NV_TIMEOUT: "20"
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      NV_KEY1: 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
      NV_KEY2: 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
      NV_PROXY_URL: http://host.docker.internal:7894
      LOG_DIR: /app/logs
      LOG_RETENTION_DAYS: "7"
      TZ: Asia/Shanghai
    <<: *resource-1c1g-host
    volumes:
      - ./logs/proxy40001:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40001:40001
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40001/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *logging

  # ─── 40005: PRIMARY CC proxy (MS-NV alternating, EXPERIMENT) ───
  auth_to_api_40005:
    build:
      context: ./proxy/cc-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40005
    restart: unless-stopped
    environment:
      PROXY_ROLE: cc
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40005"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      MIN_OUTBOUND_INTERVAL_S: "1.5"
      # R36: 5 NV keys + strict alternating + per-key proxy + timeout
      NV_NUM_KEYS: "5"
      # R36.5: NV_TIMEOUT 40→30 — NV last-resort mode: success p50=13.4s, p80=~30s
      #   30s captures 80% of viable NV requests while limiting waste per failure.
      #   With MS-first design, NV is only tried on MS all-429 (rare), so fewer timeouts overall.
      NV_TIMEOUT: "30"
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      NV_KEY1: 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
      NV_KEY2: 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
      NV_KEY3: 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
      NV_KEY4: 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
      NV_KEY5: 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
      NV_PROXY_URL: http://host.docker.internal:7894
      NV_PROXY_URL_MAP: '{"0":"http://host.docker.internal:7894","1":"http://host.docker.internal:7895","2":"http://host.docker.internal:7896","3":"http://host.docker.internal:7897","4":"http://host.docker.internal:7899"}'
      NV_MAX_CYCLE: "1200000"
      LOG_DIR: /app/logs
      LOG_RETENTION_DAYS: "7"
      TZ: Asia/Shanghai
    <<: *resource-1c1g-host
    volumes:
      - ./logs/proxy40005:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40005:40005
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40005/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *logging

  # ─── 40000: CC model→endpoint dispatcher ───
  auth_to_api_40000:
    build:
      context: ./proxy/dispatcher
      dockerfile: Dockerfile
    container_name: auth_to_api_40000
    restart: unless-stopped
    environment:
      LISTEN_PORT: "40000"
      DISPATCH_PRIMARY: "http://auth_to_api_40005:40005"
      DISPATCH_FALLBACK: "http://auth_to_api_40001:40001"
      UPSTREAM_TIMEOUT: "60"
      PROXY_TIMEOUT: "600"
      TZ: Asia/Shanghai
    ports:
      - 40000:40000
    networks:
      - cc-net
    depends_on:
      - auth_to_api_40005
      - auth_to_api_40001
    <<: *resource-1c1g
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40000/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *logging

  # ─── 40002: Codex proxy (Responses API → glm5.1 v×k) ───
  auth_to_api_40002:
    build:
      context: ./proxy/codex-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40002
    restart: unless-stopped
    environment:
      PROXY_ROLE: codex
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40002"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      LOG_DIR: /app/logs
      LOG_RETENTION_DAYS: "7"
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy40002:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40002:40002
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    <<: *resource-1c1g
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40002/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *logging

  # ─── 40003: Passthrough proxy (OpenAI → pure MS v×k) ───
  auth_to_api_40003:
    build:
      context: ./proxy/passthrough-proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40003
    restart: unless-stopped
    environment:
      PROXY_ROLE: passthrough
      LITELLM_URL_GLM51: http://ms_uni41001:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://ms_uni41001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40003"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      NUM_KEYS: "7"
      NUM_VARIANTS_GLM51: "10"
      MIN_OUTBOUND_INTERVAL_S: "1.5"
      NV_NUM_KEYS: "0"
      NV_TIMEOUT: "20"
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      NV_KEY1: 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
      NV_KEY2: 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
      NV_PROXY_URL: http://host.docker.internal:7894
      LOG_DIR: /app/logs
      LOG_RETENTION_DAYS: "7"
      TZ: Asia/Shanghai
    <<: *resource-1c1g-host
    volumes:
      - ./logs/proxy40003:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40003:40003
    networks:
      - cc-net
    depends_on:
      - ms_uni41001
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40003/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *logging


  # ─── R38: hm40006 — Hermes NV proxy (routes through LiteLLM) ───
  # Hermes → 40006 → LiteLLM 41101-41105 → mihomo per-key proxy → NV API
  # 5-key sequential round-robin via LiteLLM containers, persistent counter
  # MSG-FIX, LiteLLM handles drop_params for NV unsupported params
  # Physically isolated from cc/codex/passthrough — builds from proxy/hm-proxy/
  hm40006:
    build:
      context: ./proxy/hm-proxy
      dockerfile: Dockerfile
    container_name: hm40006
    restart: unless-stopped
    environment:
      PROXY_ROLE: passthrough
      LISTEN_PORT: "40006"
      PROXY_TIMEOUT: "300"
      UPSTREAM_TIMEOUT: "60"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MIN_OUTBOUND_INTERVAL_S: "1.5"
      # R38: LiteLLM upstream URLs (container-to-container on cc-net)
      HM_LITELLM_URL1: http://ms_nv_hm_41101:4000/v1
      HM_LITELLM_URL2: http://ms_nv_hm_41102:4000/v1
      HM_LITELLM_URL3: http://ms_nv_hm_41103:4000/v1
      HM_LITELLM_URL4: http://ms_nv_hm_41104:4000/v1
      HM_LITELLM_URL5: http://ms_nv_hm_41105:4000/v1
      HM_LITELLM_KEY: sk-litellm-local
      LOG_DIR: /app/logs
      LOG_RETENTION_DAYS: "7"
      TZ: Asia/Shanghai
    <<: *resource-1c1g-host
    volumes:
      - ./logs/proxy40006:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40006:40006
    networks:
      - cc-net
    depends_on:
      - ms_nv_hm_41101
      - ms_nv_hm_41102
      - ms_nv_hm_41103
      - ms_nv_hm_41104
      - ms_nv_hm_41105
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40006/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *logging

  # ─── R38: NV HM LiteLLM containers (41101-41105) ───
  # Hermes → hm40006 → LiteLLM 41101-41105 → mihomo per-key proxy → NV API
  # Each: 1 NV key, 4 model deployments (kimi/glm/minimax/deepseek), per-key mihomo proxy.
  # R38: HTTPS_PROXY changed from 7880(mixed) to per-key NV mihomo port (7894-7899)
  #   for direct NV API routing. LiteLLM startup GitHub access also goes through these
  #   ports (mihomo handles both US NV and general proxy).
  # NOTE: Port range 41101-41105. opc1 uses ms_nv_hm_41101 naming.

  ms_nv_hm_41101:
    image: litellm/litellm:v1.87.0
    container_name: ms_nv_hm_41101
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      # R38: No DATABASE_URL — in-memory mode, reads model_list from config.yaml
      # (DATABASE_URL causes "model=None" bug: DB ProxyModelTable empty → ignores config.yaml)
      STORE_MODEL_IN_DB: "False"
      NV_KEY1: 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
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      # R38: per-key mihomo NV proxy (7894=K1) — both NV API calls and GitHub startup
      HTTP_PROXY: http://host.docker.internal:7894
      HTTPS_PROXY: http://host.docker.internal:7894
      http_proxy: http://host.docker.internal:7894
      https_proxy: http://host.docker.internal:7894
      NO_PROXY: localhost,127.0.0.1,cc_postgres,ms_uni41001
      TZ: Asia/Shanghai
    <<: *resource-1c2g-host
    volumes:
      - ./litellm-nv-hm/config-k1.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-nv-hm-k1:/app/logs
    ports:
      - 41101:4000
    networks:
      - cc-net
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    logging: *logging
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"

  ms_nv_hm_41102:
    image: litellm/litellm:v1.87.0
    container_name: ms_nv_hm_41102
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      STORE_MODEL_IN_DB: "False"
      NV_KEY2: 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
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      # R38: per-key mihomo NV proxy (7895=K2) — both NV API calls and GitHub startup
      HTTP_PROXY: http://host.docker.internal:7895
      HTTPS_PROXY: http://host.docker.internal:7895
      http_proxy: http://host.docker.internal:7895
      https_proxy: http://host.docker.internal:7895
      NO_PROXY: localhost,127.0.0.1,cc_postgres,ms_uni41001
      TZ: Asia/Shanghai
    <<: *resource-1c2g-host
    volumes:
      - ./litellm-nv-hm/config-k2.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-nv-hm-k2:/app/logs
    ports:
      - 41102:4000
    networks:
      - cc-net
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    logging: *logging
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"

  ms_nv_hm_41103:
    image: litellm/litellm:v1.87.0
    container_name: ms_nv_hm_41103
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      STORE_MODEL_IN_DB: "False"
      NV_KEY3: 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
      NV_BASEURL: https://integrate.api.nvidia.com/v1
      # R38: per-key mihomo NV proxy (7896=K3) — both NV API calls and GitHub startup
      HTTP_PROXY: http://host.docker.internal:7896
      HTTPS_PROXY: http://host.docker.internal:7896
      http_proxy: http://host.docker.internal:7896
      https_proxy: http://host.docker.internal:7896
      NO_PROXY: localhost,127.0.0.1,cc_postgres,ms_uni41001
      TZ: Asia/Shanghai
    <<: *resource-1c2g-host
    volumes:
      - ./litellm-nv-hm/config-k3.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-nv-hm-k3:/app/logs
    ports:
      - 41103:4000

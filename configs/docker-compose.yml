# Two-model architecture: 41001 (glm5.1, 256var×7key=1792) + 42001 (dsv4p, 11var×7key=77)
# + 41003 test (glm5.1, 1000var×7key=7000) — quota exploration, temporary
# proxy.py (40001/40002) — format conversion + metrics logging
# LiteLLM handles all retry/fallback/routing — proxy does NOT retry, compact, or truncate
#
# Port assignments: 41001=glm5.1, 42001=dsv4p, 41003=glm5.1-test
# ulimit nofile: 4096 soft / 65536 hard — prevents fd exhaustion with large deployment counts
# (1792 deployments on 41001, 7000 on 41003 need more than default 1024 soft limit)

services:
  cc_postgres:
    image: postgres:16-alpine
    container_name: cc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
      POSTGRES_MULTIPLE_DATABASES: litellm_glm51,litellm_dsv4p,litellm_glm51_test
      TZ: Asia/Shanghai
    volumes:
      - cc_pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "5432"
    networks:
      - cc-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U litellm -d litellm
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: &id001
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
        tag: container/{{.Name}}

  glm5.1_uni41001:
    image: litellm/litellm:v1.87.0
    container_name: glm5.1_uni41001
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 4096
        hard: 65536
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@cc_postgres:5432/litellm_glm51
      MS_BASEURL: https://api-inference.modelscope.cn/v1
      MS_KEY1: ms-bb4e5bee-ca0e-49be-8de3-2347a57752f5
      MS_KEY2: ms-b836c297-9cb3-45f7-86b3-a33e1b76f48f
      MS_KEY3: ms-202e8dc3-b2f0-4aa3-9b56-0fa6798ac5b9
      MS_KEY4: ms-ed773f9d-9ca1-4fd9-87e4-b6acd0e545ae
      MS_KEY5: ms-69d3fbc6-6938-4fb1-b403-dfa44a05fb0c
      MS_KEY6: ms-e392cb51-9637-4766-80aa-490a6044294c
      MS_KEY7: ms-20761627-ec32-497c-a11a-7ff580617f0b
      TZ: Asia/Shanghai
    volumes:
      - ./litellm-glm51/config.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-glm51:/app/logs
    ports:
      - 41001:4000
    networks:
      - cc-net
    depends_on:
      cc_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *id001
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"

  dsv4p_uni42001:
    image: litellm/litellm:v1.87.0
    container_name: dsv4p_uni42001
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 4096
        hard: 65536
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@cc_postgres:5432/litellm_dsv4p
      MS_BASEURL: https://api-inference.modelscope.cn/v1
      MS_KEY1: ms-bb4e5bee-ca0e-49be-8de3-2347a57752f5
      MS_KEY2: ms-b836c297-9cb3-45f7-86b3-a33e1b76f48f
      MS_KEY3: ms-202e8dc3-b2f0-4aa3-9b56-0fa6798ac5b9
      MS_KEY4: ms-ed773f9d-9ca1-4fd9-87e4-b6acd0e545ae
      MS_KEY5: ms-69d3fbc6-6938-4fb1-b403-dfa44a05fb0c
      MS_KEY6: ms-e392cb51-9637-4766-80aa-490a6044294c
      MS_KEY7: ms-20761627-ec32-497c-a11a-7ff580617f0b
      TZ: Asia/Shanghai
    volumes:
      - ./litellm-dsv4p/config.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-dsv4p:/app/logs
    ports:
      - 42001:4000
    networks:
      - cc-net
    depends_on:
      cc_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *id001
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"

  # ─── TEMPORARY TEST: 1000-variant quota exploration ───
  # Purpose: test whether ModelScope quota is per-(key,model_id)
  # — each case variant gets independent 200/id/day quota.
  # 1000 variants × 7 keys = 7000 deployments, rpm=1 each = 7000 RPM capacity.
  # Will be evaluated after quota validation and removed if not beneficial.
  glm5.1_test41003:
    image: litellm/litellm:v1.87.0
    container_name: glm5.1_test41003
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 8192
        hard: 65536
    environment:
      LITELLM_MASTER_KEY: sk-litellm-local
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@cc_postgres:5432/litellm_glm51_test
      MS_BASEURL: https://api-inference.modelscope.cn/v1
      MS_KEY1: ms-bb4e5bee-ca0e-49be-8de3-2347a57752f5
      MS_KEY2: ms-b836c297-9cb3-45f7-86b3-a33e1b76f48f
      MS_KEY3: ms-202e8dc3-b2f0-4aa3-9b56-0fa6798ac5b9
      MS_KEY4: ms-ed773f9d-9ca1-4fd9-87e4-b6acd0e545ae
      MS_KEY5: ms-69d3fbc6-6938-4fb1-b403-dfa44a05fb0c
      MS_KEY6: ms-e392cb51-9637-4766-80aa-490a6044294c
      MS_KEY7: ms-20761627-ec32-497c-a11a-7ff580617f0b
      TZ: Asia/Shanghai
    volumes:
      - ./litellm-glm51-test/config.yaml:/app/config.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - ./logs/litellm-glm51-test:/app/logs
    ports:
      - 41003:4000
    networks:
      - cc-net
    depends_on:
      cc_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "2.0"
        reservations:
          memory: 768M
          cpus: "0.5"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" || exit 1
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s
    logging: *id001
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"

  auth_to_api_40001:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40001
    restart: unless-stopped
    environment:
      # glm5.1 routing → 41003 (primary, 1000var×7keys=7000 deploys)
      LITELLM_URL_GLM51: http://glm5.1_test41003:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://glm5.1_test41003:4000/v1/models
      LITELLM_URL_DSV4P: http://dsv4p_uni42001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://dsv4p_uni42001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40001"
      PROXY_TIMEOUT: "300"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "170000"
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40001:40001
    networks:
      - cc-net
    depends_on:
      - glm5.1_test41003  # Primary glm5.1 routing
      - dsv4p_uni42001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40001/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

  auth_to_api_40002:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: auth_to_api_40002
    restart: unless-stopped
    environment:
      LITELLM_URL_GLM51: http://glm5.1_test41003:4000/v1/chat/completions
      LITELLM_MODELS_URL_GLM51: http://glm5.1_test41003:4000/v1/models
      LITELLM_URL_DSV4P: http://dsv4p_uni42001:4000/v1/chat/completions
      LITELLM_MODELS_URL_DSV4P: http://dsv4p_uni42001:4000/v1/models
      LITELLM_KEY: sk-litellm-local
      LISTEN_PORT: "40002"
      PROXY_TIMEOUT: "300"
      MAX_TOOL_DESC: "2000"
      MAX_SCHEMA_DESC: "600"
      CHARS_PER_TOKEN_ESTIMATE: "3.0"
      MODEL_INPUT_TOKEN_SAFETY_GLM51: "170000"
      MODEL_INPUT_TOKEN_SAFETY_DSV4P: "170000"
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    volumes:
      - ./logs/proxy-40002:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40002:40002
    networks:
      - cc-net
    depends_on:
      - glm5.1_test41003
      - dsv4p_uni42001
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40002/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *id001

networks:
  cc-net:
    driver: bridge

volumes:
  cc_pgdata:
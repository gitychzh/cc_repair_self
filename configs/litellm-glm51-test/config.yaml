# 41003 LiteLLM Config — GLM-5.1 (7 key groups × 10 variants × 1 key = 70 deployments, rpm=1)
# R20: Reduced from 1000 to 10 variants per key group.
# WHY: ModelScope quota is 2000/key/day total. 10 variants × 200/id/key/day = 2000/key/day = per-key cap.
# More variants don't increase effective capacity. Key round-robin (R19) handles token quota distribution.
# Variant count reduction: 7000→70 deployments = massive resource savings (memory, nofile, startup time).
#
# Key round-robin design (R19):
#   - 7 model groups: glm5.1k1~glm5.1k7, each 10 variants with ONE key
#   - Proxy round-robins: request N → key_idx = (counter % 7) + 1 → model glm5.1k{idx}
#   - LiteLLM simple-shuffle within each key group (10 dep pool per group)
#   - num_retries=2: LiteLLM retries only for 500/timeout errors (not 429)
#   - RateLimitErrorAllowedFails=1: 429 within a key group triggers immediate cooldown
#   - 429 cycling: proxy tries k1, then k2, ..., k7; all 7 → 429 to agent
#   - rpm=1 unchanged (immutable constraint)
#
# First 10 variant model IDs (from original 1000-variant permutation):
#   ZHIPUAI/GLM-5.1 (v1), ZHIPUAI/GLm-5.1 (v2), ZHIPUAI/GlM-5.1 (v3), ZHIPUAI/Glm-5.1 (v4),
#   ZHIPUAI/gLM-5.1 (v5), ZHIPUAI/gLm-5.1 (v6), ZHIPUAI/glM-5.1 (v7), ZHIPUAI/glm-5.1 (v8),
#   ZHIPUAi/GLM-5.1 (v9), ZHIPUAi/GLm-5.1 (v10)


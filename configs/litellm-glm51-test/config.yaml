      api_base: os.environ/MS_BASEURL
      api_key: os.environ/MS_KEY1
      rpm: 1
      timeout: 300
      allowed_openai_params:
        - max_tokens
        - max_completion_tokens
        - reasoning_effort
        - thinking_budget
        - temperature
        - top_p
        - stream
        - stop
        - tools
        - tool_choice
        - frequency_penalty

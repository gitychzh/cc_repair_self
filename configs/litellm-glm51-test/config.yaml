# 41003 TEST LiteLLM Config — GLM-5.1 (1024 variants × 1 key = 1024 deployments, rpm=1)
# PURPOSE: Explore whether ModelScope quota is per-(key,model_id) or per-(key,base_model)
# Hypothesis: If quota is per-(key,model_id), each case-variant gets 200/id/day quota
# → 1024 variants × 200 = 204800 requests/day per key (vs current 11 × 200 = 2200)
# Test uses KEY1 only to isolate the variable. If successful, can expand to 7 keys.
#
# ALL 1024 variants are case permutations of 'zhipuai/glm-5.1'
# 10 letter positions (z,h,i,p,u,a,i,g,l,m) × 2^10 = 1024 unique strings
# ModelScope treats each unique string as independent model ID → independent quota
#
# TEMPORARY: This container is for testing only. Will be removed after validation.

model_list:
  # ─── variant 1: zhipuai/glm-5.1 ───
  - model_name: glm5.1
    litellm_params: &glm51_test_v1

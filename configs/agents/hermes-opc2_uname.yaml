# Hermes (opc2_uname) 配置模板 — 通过 passthrough proxy gateway (40003) 路由
# R35.5: All agents route to glm5.1 backend (dsv4p delisted from ModelScope)
# _key_changes: 1) base_url 从 40001→40003; 2) default 从 glm5.1_hm→glm5.1_hm (stays glm5.1); 3) context_length 保持 170000
# 所有 OpenAI agent 必须通过 passthrough proxy gateway (40003)，不能直连 LiteLLM
# 原因: LiteLLM 的 model_list 只有 v×k 路由名(glm5.1v1k1~v10k7)，没有 glm5.1 别名
# Proxy gateway 做: model name映射(glm5.1_hm→glm5.1→v×k routing) + error cycling + variant fallback
# Fallback功能暂时去掉

model:
  base_url: http://127.0.0.1:40003/v1
  default: glm5.1_hm
  provider: proxy-gateway
  context_length: 170000
providers:
  proxy-gateway:
    api_key: sk-litellm-local
    base_url: http://127.0.0.1:40003/v1
    default_model: glm5.1_hm
    name: Proxy Gateway 40003 (Hermes → glm5.1)
    transport: openai_chat

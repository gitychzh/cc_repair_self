# Codex CLI (opc2_uname) 配置模板 — 通过 proxy gateway (40001) 路由
# R25: Added fallback model_provider litellm-fallback (40002)
# Codex CLI不支持自动fallback切换，需要在config.toml中手动指定model_provider
# 当40001不可用时：修改config.toml的 model_provider = "litellm-fallback" 并重启codex

model = "glm5.1_cx"
model_provider = "litellm"
personality = "pragmatic"

# Primary provider — proxy gateway 40001
[model_providers.litellm]
name = "Proxy Gateway 40001 (Codex)"
base_url = "http://127.0.0.1:40001/v1"
wire_api = "responses"
api_key_env = "OPENAI_API_KEY"
models = ["glm5.1_cx", "glm5.1", "codex-mini-latest"]

# Fallback provider — proxy gateway 40002 (R25)
# When 40001 is being restarted/unavailable, switch to this provider:
#   Change: model_provider = "litellm-fallback"
[model_providers.litellm-fallback]
name = "Proxy Gateway 40002 (Codex fallback)"
base_url = "http://127.0.0.1:40002/v1"
wire_api = "responses"
api_key_env = "OPENAI_API_KEY"
models = ["glm5.1_cx", "glm5.1", "codex-mini-latest"]

[projects."/home/opc2_uname"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 1

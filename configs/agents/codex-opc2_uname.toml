# Codex CLI (opc2_uname) 配置模板 — 通过 codex proxy gateway (40002) 路由
# R29: Codex has its own proxy (40002, PROXY_ROLE=codex) routing to glm5.2 backend
# Fallback功能暂时去掉

model = "glm5.2_cx"
model_provider = "litellm"
personality = "pragmatic"

# Primary provider — codex proxy gateway 40002
[model_providers.litellm]
name = "Proxy Gateway 40002 (Codex → glm5.2)"
base_url = "http://127.0.0.1:40002/v1"
wire_api = "responses"
api_key_env = "OPENAI_API_KEY"
models = ["glm5.2_cx", "glm5.2", "codex-mini-latest"]

[projects."/home/opc2_uname"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 1

# 42001 LiteLLM Config — DSv4P (11 variants × 7 keys = 77 deployments, rpm=1)
# ALL 11 variants restored (2026-06-02, opc2_uname):
# Previous config removed v3-v11 claiming "null-response from ModelScope".
# VERIFIED: All 11 variants return HTTP 200 with valid choices when tested directly.
# Root cause was ModelScope non-stream 'delta' field crashing LiteLLM parser.
# Force-stream fix (deployed 2026-06-01) resolves this for ALL variants.
# Removing variants = removing quota capacity (200/id/day per variant).
# NEVER remove variants — each has independent quota allocation.
#
# Changes (2026-06-02, opc2_uname):
#   - Restored all 11 variants (v3-v11 added back)
#   - 14→77 deployments (11 variants × 7 keys)
#   - num_retries: 5→3 (more deployments available, 5 retries = excessive latency)
#   - RateLimitErrorAllowedFails: 3→1 (more deployments = less tolerance needed)
#   - TimeoutErrorAllowedFails: 3→2 (same reasoning)
#   - rolling_window_size: 300→30 (shorter window = faster routing adaptation)
#   - BadRequestErrorAllowedFails removed (was 0, redundant)
#   - drop_params: false→true (DSv4P doesn't support reasoning_effort; drop it gracefully)
#   - allowed_openai_params added (parity with glm5.1 config)
#   - lowest_latency_buffer + rolling_window_size moved to routing_strategy_args (LiteLLM v1.85 ignores them at router_settings level)


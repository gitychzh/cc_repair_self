# 42001 LiteLLM Config — DSv4P (11 variants × 7 keys = 77 deployments, rpm=1)
# ALL 11 variants restored (2026-06-02, opc2_uname):
# Previous config removed v3-v11 claiming "null-response from ModelScope".
# VERIFIED: All 11 variants return HTTP 200 with valid choices when tested directly.
# Root cause was ModelScope non-stream 'delta' field crashing LiteLLM parser.
# Force-stream fix (deployed 2026-06-01) resolves this for ALL variants.
# Removing variants = removing quota capacity (200/id/day per variant).
# NEVER remove variants — each has independent quota allocation.
#
# Changes (2026-06-05, opc2_uname R2):
#   - routing_strategy: simple-shuffle → latency-based-routing (parity with glm5.1)
#   - cooldown_time: 10 → 30 (same as glm5.1; 10 too aggressive for RPM rotation)
#   - RateLimitErrorAllowedFails: 5 → 3 (same as glm5.1; 5 too tolerant for RPM 429)
#   - Added rolling_window_size=30, lowest_latency_buffer=2 (parity with glm5.1)
#   - router_settings format aligned with glm5.1 (allowed_fails instead of allowed_fails_policy)
#
# Previous changes (2026-06-02):
#   - Restored all 11 variants (v3-v11 added back) — 14→77 deployments
#   - num_retries: 3→5 (more retries needed when RPM windows temporarily full)
#   - TimeoutErrorAllowedFails: 2 (unchanged)
#   - InternalServerErrorAllowedFails: 3 (ModelScope null choices in health checks)
#   - drop_params: true (DSv4P doesn't support reasoning_effort; drop it gracefully)
#   - allowed_openai_params added (parity with glm5.1 config)
#   - Quota verification (2026-06-02 06:34 UTC): ALL 7 keys × 11 variants = 77/77 working.
#     KEY1-7 dsv4p: HTTP 200 with 185-188/200 remaining per-variant.


# 42001 LiteLLM Config — DSv4P (7 key groups × 11 variants × 1 key = 77 deployments, rpm=1)
# RETAINED BUT NOT ROUTED since R21 — proxy routes all traffic to ms_uni41001
# Can be re-routed by changing proxy env var LITELLM_URL_DSV4P if ms_uni41001 fails
# R19 format: Key round-robin routing dsv4pk1→k2→...→k7
# Each key group has 11 case-permutation variants with independent 200/id/day quota.
# NEVER remove variants — removing = removing quota capacity.
#
# All 11 variant model IDs (IMMUTABLE):
#   deepseek-ai/deepseek-v4-pro (v1)
#   deepseek-ai/Deepseek-V4-Pro (v2)
#   deepseek-ai/DeepSeek-v4-pro (v3)
#   deepseek-ai/DeepSeek-v4-Pro (v4)
#   deepseek-ai/DeepSeek-V4-PrO (v5)
#   deepseek-ai/DeepSeek-V4-PRo (v6)
#   deepseek-ai/DeepSeeK-V4-Pro (v7)
#   deepseek-ai/DeepSeEk-V4-Pro (v8)
#   deepseek-ai/DeepSEek-V4-Pro (v9)
#   deepseek-ai/DeePSeek-V4-Pro (v10)
#   deepseek-ai/DeEpSeek-V4-Pro (v11)
#
# Key round-robin design (R19):
#   - 7 model groups: dsv4pk1~dsv4pk7, each 11 variants with ONE key
#   - Proxy round-robins: request N → key_idx = counter % NUM_KEYS → model "dsv4pk{idx+1}"
#   - LiteLLM simple-shuffle within each key group (11 dep pool per group)
#   - num_retries=2: LiteLLM retries only for 500/timeout errors (not 429)
#   - RateLimitErrorAllowedFails=1: 429 triggers immediate cooldown
#   - 429 cycling: proxy tries k1, then k2, ..., k7; all 7 → 429 to agent
#   - All variant model IDs unchanged (immutable constraint)
#   - rpm=1 unchanged (immutable constraint)


# R36: NV LiteLLM container for Key5 (port 41105)
# 1 deployment: nvglm5.1_k5 → NVIDIA API z-ai/glm-5.1 via Key5
# NOTE: This container is for monitoring/debugging. Proxy calls NV API directly
# via HTTPS CONNECT tunnel (LiteLLM v1.87 can't route through HTTPS proxy).
model_list:
  - model_name: nvglm5.1_k5
    litellm_params:
      model: openai/z-ai/glm-5.1
      api_key: os.environ/NV_KEY5
      api_base: os.environ/NV_BASEURL
      timeout: 60
      drop_params: true
    model_info:
      mode: chat
      max_tokens: 131072

router_settings:
  num_retries: 0
  cooldown_time: 10
  routing_strategy: simple-shuffle
  allowed_fails_policy:
    num_retries_allowed_fails_policy: 0
    model_group_allowed_fails_policy_map: {}

general_settings:
  drop_params: true
  json_logs: true
  request_timeout: 60

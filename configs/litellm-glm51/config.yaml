# 41001 LiteLLM Config — GLM-5.1 (7 key groups × 1000 variants × 1 key = 7000 deployments, rpm=1) [BACKUP]
# PURPOSE: Production deployment with key-level round-robin routing.
# Proxy (40001) cycles keys in round-robin order: glm5.1k1 → glm5.1k2 → ... → glm5.1k7 → k1...
# On 429, proxy cycles to next key. All 7 keys 429 → return 429 to agent.
# Each key group has 1000 case-permutation variants with independent 200/id/day quota.
# NEVER remove variants — removing = removing quota capacity.
#
# Key round-robin design (R19):
#   - 7 model groups: glm5.1k1~glm5.1k7, each 1000 variants with ONE key
#   - Proxy round-robins: request N → key_idx = (counter % 7) + 1 → model glm5.1k{idx}
#   - LiteLLM simple-shuffle within each key group (1000 dep pool per group)
#   - num_retries=2: LiteLLM retries only for 500/timeout errors (not 429)
#   - RateLimitErrorAllowedFails=1: 429 within a key group triggers immediate cooldown
#   - 429 cycling: proxy tries k1, then k2, ..., k7; all 7 → 429 to agent
#   - All variant model IDs unchanged (immutable constraint)
#   - rpm=1 unchanged (immutable constraint)
#
# Variant generation strategy:
#   "zhipuai" → 7 letter positions (2^7 = 128 perms)
#   "glm" → 3 letter positions (2^3 = 8 perms)
#   128 × 8 = 1024, take first 1000
model_list:
- model_name: glm5.1k1
  litellm_params:
    model: openai/ZHIPUAI/GLM-5.1
    api_base: os.environ/MS_BASEURL
    api_key: os.environ/MS_KEY1
    rpm: 1
    timeout: 300
    allowed_openai_params: &id001
    - max_tokens
    - max_completion_tokens
    - reasoning_effort
    - thinking_budget
    - temperature
    - top_p
    - stream
    - stop
    - tools
    - tool_choice
    - frequency_penalty
    - presence_penalty
    - n
    - user
    - response_format
    - seed
    - logprobs

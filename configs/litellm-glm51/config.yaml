# 41001 LiteLLM Config — GLM-5.1 only (11 variants × 6 keys = 66 deployments, rpm=1)
# IMMUTABLE: 11 variant IDs and rpm=1 MUST NOT be changed
# KEY5 (ms-f7231d97) REVOKED — ModelScope returns 401. Removed to prevent auth error loop.
# Each variant has independent 200/id/day quota on ModelScope
#
# opc2_uname_r2 changes (data-driven):
#   - KEY5 removed from all variants (was duplicate of KEY1, 401 auth errors)
#   - 77→66 deployments (11 variants × 6 keys, KEY5 revoked)
#   - AuthenticationErrorAllowedFails: 0 added (prevent 401 freeze chain)
#   - store_prompts_in_spend_logs: true added (debugging parity with dsv4p)
#   - timeout: 180→300 per deployment (match dsv4p, allow retries within request_timeout)
#   - cooldown_time: 120→60 (reduce capacity loss during cooldown)
#   - lowest_latency_buffer: 0.3→0.1 (tighter latency routing at rpm=1)
#   - RateLimitErrorAllowedFails: 3→1 (rpm=1 rate limit is definitive)


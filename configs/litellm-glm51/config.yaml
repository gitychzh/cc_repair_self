# 41001 LiteLLM Config — glm5.2 (70 dep), rpm=1
# R35.5: dsv4p removed from ModelScope — 70 dep down from 140.
# Container name: ms_uni41001
#
# Variant×Key round-robin (R21):
#   Proxy 2D round-robin: request N → variant_idx=(N//7)%10, key_idx=N%7
#   → model name format: glm5.1v{V}k{K} (e.g. glm5.1v1k1)
#   429 cycling: same variant, next key (k→k+1). All 7 keys 429 → variant fallback (R23)
#   LiteLLM does NOT do routing — proxy precisely specifies variant+key combo
#   Each dep has unique model_name for proxy-level routing control
#
# ─── glm5.2 variant IDs (10, IMMUTABLE): ───
#   ZHIPUAI/GLM-5.2 (v1)
#   ZHIPUAI/GLm-5.2 (v2)
#   ZHIPUAI/GlM-5.2 (v3)
#   ZHIPUAI/Glm-5.2 (v4)
#   ZHIPUAI/gLM-5.2 (v5)
#   ZHIPUAI/gLm-5.2 (v6)
#   ZHIPUAI/glM-5.2 (v7)
#   ZHIPUAI/glm-5.2 (v8)
#   ZHIPUAi/GLM-5.2 (v9)
#   ZHIPUAi/GLm-5.2 (v10)
#
# model_name format: glm5.1v{variant_idx}k{key_idx}
#   glm5.1v1k1 = GLM-5.2 variant1 + MS_KEY1
#   Total: 7 key groups × 10 variants = 70 unique model_name
#   rpm=1 per deployment (immutable constraint)
#
# NEVER remove variants — removing = removing quota capacity (200/id/day)

model_list:
  # ─── glm5.1 Key group 1: MS_KEY1 ───
  - model_name: glm5.1v1k1
    litellm_params:
      model: openai/ZHIPUAI/GLM-5.2
      api_base: os.environ/MS_BASEURL
      api_key: os.environ/MS_KEY1
      rpm: 1
      timeout: 300
      allowed_openai_params:
        - max_tokens
        - max_completion_tokens
        - reasoning_effort
        - thinking_budget
        - temperature
        - top_p
        - stream
        - stop
        - tools
        - tool_choice
        - frequency_penalty
        - presence_penalty
        - n
        - user
        - response_format
        - seed
        - logprobs
    model_info:

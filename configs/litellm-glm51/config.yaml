# 41001 LiteLLM Config — GLM-5.1 (1000 variants × 7 keys = 7000 deployments, rpm=1) [BACKUP]
# PURPOSE: Backup deployment config, identical to 41003 (PRIMARY) for disaster recovery.
# Synced from running disk config on 2026-06-11 — previous repo version had stale 256-dep config.
# 1000 case-permutation variants of zhipuai/glm-5.1 × 7 keys = 7000 deployments.
# Each variant gets independent 200/id/day quota allocation from ModelScope.
# NEVER remove variants — removing = removing quota capacity.
#
# Variant generation strategy:
#   "zhipuai" → 7 letter positions (2^7 = 128 perms)
#   "glm" → 3 letter positions (2^3 = 8 perms)
#   128 × 8 = 1024, take first 1000
#
# Router settings (optimized based on June 5 metrics data):
#   - num_retries: 8 (R3: 6% 429 insufficient_quota; 7000 dep pool, more retries finds healthy dep faster)
#     Evidence: post-sync metrics 1139 req, 70 429 (6.1%), avg 429 latency 3948ms (= 5×800ms)
#     8 retries → ~6400ms worst case, but higher probability of hitting fresh variant+key combo
#   - RateLimitErrorAllowedFails: 5 (429 is RPM + insufficient_quota, high tolerance prevents cascading cooldown)
#   - cooldown_time: 10 (429 RPM is 1-min window, 10s cooldown is proportional)
#   - routing_strategy: simple-shuffle (7000 dep pool — latency-based-routing overhead too high)
#   - drop_params: true (dsv4p reasoning_effort compat)
#
# Data evidence (2026-06-05 metrics):
#   - 95.1% success rate (156/164), 4.9% 429 (all insufficient_quota)
#   - 429 concentrated at 04:14-04:45 (all 7 keys quota temporarily exhausted)
#   - avg duration 19.3s, p90 31.5s, LiteLLM avg 9.8s
#   - 0% 529 — INPUT-REJECT estimation fix working correctly
#   - latency-based-routing on 1792 dep: avg overhead 1.5s, not justified vs simple-shuffle


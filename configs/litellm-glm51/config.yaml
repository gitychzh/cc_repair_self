# 41001 LiteLLM Config — GLM-5.1 (11 variants × 7 keys = 77 deployments, rpm=1)
# ALL 11 variants restored (2026-06-02, opc2_uname):
# Previous config removed v5-v11 claiming "null-response from ModelScope".
# VERIFIED: All 11 variants return HTTP 200 with valid choices when tested directly.
# Root cause was ModelScope non-stream 'delta' field crashing LiteLLM parser.
# Force-stream fix (deployed 2026-06-01) resolves this for ALL variants.
# Removing variants = removing quota capacity (200/id/day per variant).
# NEVER remove variants — each has independent quota allocation.
#
# Changes (2026-06-02):
#   - Restored all 11 variants (v5-v11 added back) — 28→77 deployments
#   - num_retries: 3→5 (more retries needed when RPM windows temporarily full)
#   - RateLimitErrorAllowedFails: 1→3 (429 is temporary RPM, NOT permanent quota exhaustion; verified ALL keys working)
#   - TimeoutErrorAllowedFails: 2 (unchanged)
#   - InternalServerErrorAllowedFails: 3 (ModelScope null choices in health checks)
#   - cooldown_time: 60→30 (LiteLLM default=5s, 60s caused cascading unhealthy)
#   - rolling_window_size: 300→30 (shorter window = faster routing adaptation)
#   - lowest_latency_buffer + rolling_window_size moved to routing_strategy_args
#   - Quota verification (2026-06-02 06:34 UTC): ALL 7 keys × 11 variants = 77/77 working.
#     KEY4/KEY6: HTTP 200 with 142-166/200 remaining per-variant. Previous 429 was temporary RPM rate_limit.


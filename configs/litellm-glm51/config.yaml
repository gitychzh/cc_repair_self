# 41001 LiteLLM Config — GLM-5.1 (256 variants × 7 keys = 1792 deployments, rpm=1)
# 256 case-permutation variants of zhipuai/glm-5.1 × 7 keys = 1792 deployments.
# Each variant gets independent 200/id/day quota allocation from ModelScope.
# NEVER remove variants — removing = removing quota capacity.
#
# Variant generation strategy:
#   "zhipuai" → 128 case perms (2^7), take first 32
#   "glm"     → 8 case perms (2^3), take all 8
#   32 × 8 = 256 total variants
#
# Routing & resilience (unchanged from R11):
#   - num_retries: 5 (more retries needed when RPM windows temporarily full)
#   - RateLimitErrorAllowedFails: 3 (429 is temporary RPM, NOT permanent quota exhaustion)
#   - TimeoutErrorAllowedFails: 2
#   - InternalServerErrorAllowedFails: 3 (ModelScope null choices in health checks)
#   - cooldown_time: 30 (LiteLLM default=5s, 60s caused cascading unhealthy)
#   - rolling_window_size: 30 (shorter window = faster routing adaptation)

